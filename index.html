<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Plus</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(
        135deg,
        #0f2a24,
        #1e4a3f,
        #3a7d6b
      );
      color: #ffffff;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 80px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 48px;
    }

    .label {
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.8;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 56px;
      line-height: 1.1;
      margin: 0 0 24px;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.85;
      max-width: 420px;
      margin-bottom: 32px;
    }

    .button {
      display: inline-block;
      background: #f5c16c;
      color: #000;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    .phone {
      display: flex;
      justify-content: center;
    }

    .phone img {
      max-width: 300px;
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        text-align: center;
      }

      h1 {
        font-size: 42px;
      }

      .phone {
        margin-top: 48px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div>
      <div class="label">HABIT PLUS</div>
      <h1>
        Build habits<br>
        without pressure
      </h1>
      <div class="subtitle">
        No streak guilt. No overwhelm.  
        Just steady progress that fits real life.
      </div>
      <a
        class="button"
        href="YOUR_PLAYSTORE_LINK"
        target="_blank"
      >
        Get it on Google Play
      </a>
    </div>

    <div class="phone">
      <!-- Placeholder image for now -->
      <img src="https://via.placeholder.com/300x600?text=Habit+Plus" alt="Habit Plus App">
    </div>
  </div>
</body>
</html>
