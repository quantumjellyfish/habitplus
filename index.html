<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habit Plus</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f1f1c, #1e3a34);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 32px;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      opacity: 0.85;
      margin-bottom: 24px;
    }
    a.button {
      display: inline-block;
      padding: 14px 24px;
      background: #f5c16c;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Habit Plus</h1>
    <p>Build habits without pressure. No streak guilt. Just progress.</p>
    <a class="button" href="https://play.google.com/store/apps/details?id=com.quantumjellyfish.habitplus&pcampaignid=web_share" target="_blank">
      Get it on Google Play
    </a>
  </div>
</body>
</html>
